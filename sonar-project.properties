sonar.projectKey=EmployeeManagementSystem
sonar.projectName=EmployeeManagementSystem
sonar.projectVersion=1.0

sonar.sources=backend
sonar.tests=backend/tests

sonar.python.version=3.14
sonar.sourceEncoding=UTF-8

sonar.python.coverage.reportPaths=backend/coverage.xml

# Ignore cache and virtual environment
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/venv/**

# Tell Sonar which files are tests
sonar.test.inclusions=backend/tests/**/*.py
